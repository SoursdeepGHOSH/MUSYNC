<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MUSYNC</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
    <!-- Blurred Background -->
    <div class="background-animation blurred-bg">
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
        </div>
    </div>

    <!-- Back Button -->
    <a href="welcome.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back</span>
    </a>

    <main class="auth-main">
        <div class="auth-wrapper">
            <!-- Left Side - Visual -->
            <div class="auth-visual-section">
                <div class="auth-branding">
                    <div class="brand-logo">
                        <i class="fa-solid fa-music"></i>
                    </div>
                    <h1 class="brand-title">MUSYNC</h1>
                </div>
                <div class="vinyl-container">
                    <div class="vinyl-record auth-vinyl">
                        <div class="vinyl-inner">
                            <div class="vinyl-label">
                                <i class="fa-solid fa-music"></i>
                            </div>
                        </div>
                        <div class="vinyl-grooves"></div>
                    </div>
                </div>
                <div class="auth-tagline">
                    <h2>Start Your Music Journey</h2>
                    <p>Create an account to save playlists, upload music, and personalize your experience</p>
                </div>
            </div>

            <!-- Right Side - Form -->
            <div class="auth-form-section">
                <div class="auth-card register-card">
                    <div class="auth-header">
                        <div class="auth-icon register-icon">
                            <i class="fa-solid fa-user-plus"></i>
                        </div>
                        <h1>Create Account</h1>
                        <p>Join MUSYNC and start your music journey</p>
                    </div>

                    <form class="auth-form" id="registerForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">
                                    <i class="fa-solid fa-user"></i>
                                    First Name
                                </label>
                                <input type="text" id="firstName" name="firstName" placeholder="John" required>
                            </div>

                            <div class="form-group">
                                <label for="lastName">
                                    <i class="fa-solid fa-user"></i>
                                    Last Name
                                </label>
                                <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="username">
                                <i class="fa-solid fa-at"></i>
                                Username
                            </label>
                            <input type="text" id="username" name="username" placeholder="Choose a username" required>
                        </div>

                        <div class="form-group">
                            <label for="email">
                                <i class="fa-solid fa-envelope"></i>
                                Email Address
                            </label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        </div>

                        <div class="form-group">
                            <label for="password">
                                <i class="fa-solid fa-lock"></i>
                                Password
                            </label>
                            <div class="password-input">
                                <input type="password" id="password" name="password"
                                    placeholder="Create a strong password" required minlength="6">
                                <button type="button" class="toggle-password" id="togglePassword">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                            <div class="password-strength" id="passwordStrength">
                                <div class="strength-bar"></div>
                                <span class="strength-text">Password strength</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">
                                <i class="fa-solid fa-lock"></i>
                                Confirm Password
                            </label>
                            <div class="password-input">
                                <input type="password" id="confirmPassword" name="confirmPassword"
                                    placeholder="Confirm your password" required>
                                <button type="button" class="toggle-password" id="toggleConfirmPassword">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" id="terms" name="terms" required>
                                <span class="checkmark"></span>
                                I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
                            </label>
                        </div>

                        <button type="submit" class="auth-btn register-btn">
                            <span>Create Account</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Already have an account? <a href="login.html">Sign In</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { registerUser } from './supabaseClient.js';

        // Toggle password visibility
        function setupPasswordToggle(toggleBtn, inputField) {
            toggleBtn.addEventListener('click', () => {
                const type = inputField.type === 'password' ? 'text' : 'password';
                inputField.type = type;
                toggleBtn.innerHTML = type === 'password'
                    ? '<i class="fa-solid fa-eye"></i>'
                    : '<i class="fa-solid fa-eye-slash"></i>';
            });
        }

        setupPasswordToggle(
            document.getElementById('togglePassword'),
            document.getElementById('password')
        );
        setupPasswordToggle(
            document.getElementById('toggleConfirmPassword'),
            document.getElementById('confirmPassword')
        );

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.querySelector('.strength-bar');
        const strengthText = document.querySelector('.strength-text');

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            const strengthLevels = ['weak', 'fair', 'good', 'strong', 'excellent'];
            const strengthColors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4'];

            const level = Math.min(strength, 4);
            strengthBar.style.width = `${(strength / 5) * 100}%`;
            strengthBar.style.background = strengthColors[level];
            strengthText.textContent = strength > 0 ? strengthLevels[level] : 'Password strength';
            strengthText.style.color = strengthColors[level];
        });

        // Form submission
        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;

            try {
                await registerUser(firstName, lastName, username, email, password);
                alert('Account created successfully! Please login.');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Registration error:', error);
                alert(error.message || 'Registration failed. Please try again.');
            }
        });
    </script>
</body>

</html>
