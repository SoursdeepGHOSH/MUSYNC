<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MUSYNC</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
    <!-- Blurred Background -->
    <div class="background-animation blurred-bg">
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
        </div>
    </div>

    <!-- Back Button -->
    <a href="welcome.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back</span>
    </a>

    <main class="auth-main">
        <div class="auth-wrapper">
            <!-- Left Side - Visual -->
            <div class="auth-visual-section">
                <div class="auth-branding">
                    <div class="brand-logo">
                        <i class="fa-solid fa-music"></i>
                    </div>
                    <h1 class="brand-title">MUSYNC</h1>
                </div>
                <div class="vinyl-container">
                    <div class="vinyl-record auth-vinyl">
                        <div class="vinyl-inner">
                            <div class="vinyl-label">
                                <i class="fa-solid fa-music"></i>
                            </div>
                        </div>
                        <div class="vinyl-grooves"></div>
                    </div>
                </div>
                <div class="auth-tagline">
                    <h2>Your Music Journey Awaits</h2>
                    <p>Sign in to unlock unlimited access to your personalized music experience</p>
                </div>
            </div>

            <!-- Right Side - Form -->
            <div class="auth-form-section">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-icon">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <h1>Welcome Back</h1>
                        <p>Sign in to access your music library</p>
                    </div>

                    <form class="auth-form" id="loginForm">
                        <div class="form-group">
                            <label for="email">
                                <i class="fa-solid fa-envelope"></i>
                                Email Address
                            </label>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>

                        <div class="form-group">
                            <label for="password">
                                <i class="fa-solid fa-lock"></i>
                                Password
                            </label>
                            <div class="password-input">
                                <input type="password" id="password" name="password" placeholder="Enter your password"
                                    required>
                                <button type="button" class="toggle-password" id="togglePassword">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" id="remember" name="remember">
                                <span class="checkmark"></span>
                                Remember me
                            </label>
                            <a href="#" class="forgot-password">Forgot Password?</a>
                        </div>

                        <button type="submit" class="auth-btn">
                            <span>Sign In</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Don't have an account? <a href="register.html">Sign Up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { loginUser } from './supabaseClient.js';

        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.innerHTML = type === 'password'
                ? '<i class="fa-solid fa-eye"></i>'
                : '<i class="fa-solid fa-eye-slash"></i>';
        });

        // Form submission
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await loginUser(email, password);
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Login error:', error);
                alert(error.message || 'Login failed. Please try again.');
            }
        });
    </script>
</body>

</html>
